<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B5E20"/>
      <stop offset="100%" style="stop-color:#2E7D32"/>
    </linearGradient>
  </defs>
  <!-- Circle background -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Gold ring -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="#D4AF37" stroke-width="12"/>
  <!-- Tow truck icon -->
  <g transform="translate(100, 150) scale(2.2)" fill="#FFFFFF">
    <!-- Truck body -->
    <rect x="50" y="30" width="80" height="50" rx="6" fill="#FFFFFF"/>
    <!-- Cabin -->
    <path d="M50 30 L20 55 L20 80 L50 80 Z" fill="#D4AF37"/>
    <!-- Cabin window -->
    <path d="M48 35 L28 55 L28 65 L48 65 Z" fill="#1B5E20" opacity="0.6"/>
    <!-- Flatbed -->
    <rect x="50" y="25" width="90" height="8" rx="3" fill="#D4AF37"/>
    <!-- Wheels -->
    <circle cx="35" cy="85" r="12" fill="#FFFFFF"/>
    <circle cx="35" cy="85" r="6" fill="#1B5E20"/>
    <circle cx="110" cy="85" r="12" fill="#FFFFFF"/>
    <circle cx="110" cy="85" r="6" fill="#1B5E20"/>
    <!-- Hydraulic arm -->
    <line x1="60" y1="25" x2="75" y2="5" stroke="#D4AF37" stroke-width="5" stroke-linecap="round"/>
    <line x1="75" y1="5" x2="95" y2="15" stroke="#D4AF37" stroke-width="4" stroke-linecap="round"/>
  </g>
  <!-- Arabic text "سطحة" -->
  <text x="256" y="400" text-anchor="middle" fill="#D4AF37" font-family="Arial, sans-serif" font-size="52" font-weight="bold">سطحة</text>
</svg>
